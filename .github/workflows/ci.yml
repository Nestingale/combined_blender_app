name: Build and Deploy Blender API (Docker)

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set BUILD_ENV
        id: buildenv
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "BUILD_ENV=production" >> $GITHUB_ENV
          else
            echo "BUILD_ENV=development" >> $GITHUB_ENV
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ci/Dockerfile
          push: false
          tags: blender-api:ci
          build-args: |
            BUILD_ENV=${{ env.BUILD_ENV }}

      # GCP Artifact Registry Deployment
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ github.ref == 'refs/heads/main' && secrets.GCP_SA_KEY_PRODUCT_3D_PROD || secrets.GCP_SA_KEY_PRODUCT_3D_DEV }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Set GCP Project and Region
        run: |
          if [[ "$GITHUB_REF" == "refs/heads/main" ]]; then
            echo "GCP_PROJECT=product-3d-prod-XXXX" >> $GITHUB_ENV
            echo "GCP_REGION=us-east4" >> $GITHUB_ENV
            echo "REPO_NAME=blender-containers" >> $GITHUB_ENV
          else
            echo "GCP_PROJECT=product-3d-dev-379843" >> $GITHUB_ENV
            echo "GCP_REGION=us-east4" >> $GITHUB_ENV
            echo "REPO_NAME=blender-containers" >> $GITHUB_ENV
          fi

      - name: Build and Push to GCP Artifact Registry
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ci/Dockerfile
          push: true
          tags: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.REPO_NAME }}/blender_app:${{ env.BUILD_ENV }}-latest
          build-args: |
            BUILD_ENV=${{ env.BUILD_ENV }}

      - name: Output deployment info
        run: |
          echo "✅ GCP AR: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.REPO_NAME }}/blender_app:${{ env.BUILD_ENV }}-latest"
